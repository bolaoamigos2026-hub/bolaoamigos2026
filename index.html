<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --verde-escuro: #0a3622;
    --verde-campo: #1a6b2f;
    --verde-medio: #2d8c47;
    --amarelo: #f5d442;
    --amarelo-claro: #fef08a;
    --branco: #f8f9f0;
    --cinza: #e8ead8;
    --texto: #0a3622;
    --muted: #4a7c5e;
    --card-bg: #ffffff;
    --border: #c8d9c0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0f4ec;
    color: var(--texto);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--verde-escuro);
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--amarelo);
  }
  .header-left h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--amarelo);
    letter-spacing: 1px;
    line-height: 1;
  }
  .header-left p {
    font-size: 12px;
    color: #9fd9a8;
    margin-top: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header-badge {
    background: var(--amarelo);
    color: var(--verde-escuro);
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* TABS */
  .tabs {
    background: var(--verde-escuro);
    display: flex;
    gap: 2px;
    padding: 0 24px;
  }
  .tab {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #9fd9a8;
    padding: 12px 20px 10px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .tab:hover { color: #fff; }
  .tab.active {
    color: var(--amarelo);
    border-bottom-color: var(--amarelo);
  }

  /* MAIN */
  .main { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }

  .page { display: none; }
  .page.active { display: block; }

  /* ============ JOGOS ============ */
  .day-block { margin-bottom: 24px; }
  .day-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .day-label {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--verde-escuro);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .day-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .rodada-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    background: var(--cinza);
    padding: 3px 10px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .jogo-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: box-shadow 0.15s;
  }
  .jogo-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .jogo-num {
    font-size: 11px;
    color: var(--muted);
    min-width: 24px;
    font-weight: 600;
  }
  .jogo-grupo {
    font-size: 11px;
    font-weight: 700;
    color: var(--verde-campo);
    background: #e8f5ec;
    padding: 2px 7px;
    border-radius: 6px;
    min-width: 30px;
    text-align: center;
  }
  .jogo-times {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .time-nome {
    font-size: 14px;
    font-weight: 600;
    color: var(--texto);
    min-width: 120px;
  }
  .time-nome.right { text-align: right; }
  .placar-box {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .placar-input {
    width: 42px;
    height: 36px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Oswald', sans-serif;
    text-align: center;
    color: var(--verde-escuro);
    background: #fff;
    transition: border-color 0.2s;
  }
  .placar-input:focus {
    outline: none;
    border-color: var(--verde-campo);
  }
  .placar-input.filled {
    background: var(--verde-escuro);
    color: var(--amarelo);
    border-color: var(--verde-escuro);
  }
  .placar-sep {
    font-size: 18px;
    font-weight: 700;
    color: var(--muted);
  }
  .salvar-btn {
    background: var(--verde-campo);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .salvar-btn:hover { background: var(--verde-escuro); }
  .salvar-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }
  .resultado-badge {
    display: none;
    align-items: center;
    gap: 6px;
    background: var(--verde-escuro);
    color: var(--amarelo);
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 8px;
    letter-spacing: 1px;
  }
  .resultado-badge.show { display: flex; }
  .editar-btn {
    display: none;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
  }
  .editar-btn.show { display: block; }

  /* ============ RANKING ============ */
  .ranking-header {
    display: grid;
    grid-template-columns: 40px 1fr repeat(5, 60px);
    gap: 8px;
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .ranking-row {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: grid;
    grid-template-columns: 40px 1fr repeat(5, 60px);
    gap: 8px;
    padding: 12px 16px;
    margin-bottom: 6px;
    align-items: center;
    transition: box-shadow 0.15s;
  }
  .ranking-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .ranking-row.top1 {
    border-color: var(--amarelo);
    background: linear-gradient(135deg, #fffde7 0%, #fff 100%);
  }
  .ranking-row.top2 { border-color: #c0c0c0; }
  .ranking-row.top3 { border-color: #cd7f32; }
  .pos-badge {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }
  .pos-badge.p1 { background: var(--amarelo); color: var(--verde-escuro); }
  .pos-badge.p2 { background: #e8e8e8; color: #444; }
  .pos-badge.p3 { background: #f0e0cc; color: #7a4010; }
  .pos-badge.pn { background: #f0f4ec; color: var(--muted); }
  .rank-nome {
    font-size: 15px;
    font-weight: 600;
    color: var(--texto);
  }
  .rank-stat {
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--texto);
  }
  .rank-total {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Oswald', sans-serif;
    color: var(--verde-campo);
  }
  .rank-total.leader { color: var(--amarelo); background: var(--verde-escuro); border-radius: 8px; padding: 2px 8px; }

  /* ============ PALPITES ============ */
  .palpites-filter {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-btn {
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--verde-escuro);
    color: var(--amarelo);
    border-color: var(--verde-escuro);
  }

  .palpites-table-wrap { overflow-x: auto; border-radius: 10px; }
  table.palpites {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    font-size: 13px;
  }
  table.palpites th {
    background: var(--verde-escuro);
    color: var(--amarelo);
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.5px;
    padding: 10px 8px;
    text-align: center;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  table.palpites th.jogo-col { text-align: left; min-width: 200px; }
  table.palpites td {
    padding: 8px;
    border-bottom: 1px solid #f0f4ec;
    text-align: center;
    white-space: nowrap;
  }
  table.palpites td.jogo-col {
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    color: var(--texto);
    padding-left: 12px;
  }
  table.palpites tr:hover td { background: #f8fbf5; }
  .pal-cell { font-weight: 600; color: #444; }
  .pal-cell.exato { color: var(--verde-campo); background: #e8f5ec; border-radius: 4px; padding: 1px 4px; }
  .pal-cell.certo { color: #b07800; background: #fff9e0; border-radius: 4px; padding: 1px 4px; }
  .pal-cell.errado { color: #ccc; }
  .pal-cell.sem-resultado { color: #aaa; }
  .resultado-col { color: var(--verde-escuro); font-weight: 700; font-family: 'Oswald', sans-serif; font-size: 15px; }

  /* ============ GRUPOS ============ */
  .grupos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .grupo-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .grupo-titulo {
    background: var(--verde-escuro);
    color: var(--amarelo);
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .grupo-titulo span { font-size: 11px; color: #9fd9a8; font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.5px; }
  table.grupo-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.grupo-table th {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 8px;
    background: #f8fbf5;
    text-align: center;
  }
  table.grupo-table th.nome { text-align: left; }
  table.grupo-table td {
    padding: 9px 8px;
    border-top: 1px solid #f0f4ec;
    text-align: center;
    font-weight: 600;
    color: var(--texto);
  }
  table.grupo-table td.nome {
    text-align: left;
    font-weight: 600;
    padding-left: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  table.grupo-table tr.classificado td { background: #f0fbf5; }
  table.grupo-table tr.classificado td.nome::before {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--verde-campo);
    display: inline-block;
    flex-shrink: 0;
  }
  .editar-grupo-btn {
    font-size: 11px;
    color: #9fd9a8;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 3px 8px;
    cursor: pointer;
  }
  .grupo-edit-form {
    display: none;
    padding: 10px 12px;
    background: #f8fbf5;
    border-top: 1px solid var(--border);
    gap: 8px;
    flex-direction: column;
  }
  .grupo-edit-form.open { display: flex; }
  .grupo-edit-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }
  .grupo-pos-input {
    width: 44px;
    padding: 4px 6px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    font-family: 'Oswald', sans-serif;
  }
  .salvar-grupo-btn {
    align-self: flex-start;
    background: var(--verde-campo);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ============ CARD SHARE ============ */
  .share-section { margin-top: 24px; }
  .share-title {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--verde-escuro);
    margin-bottom: 12px;
  }
  .share-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .share-controls select, .share-controls input {
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: var(--texto);
  }
  .gerar-card-btn {
    background: var(--verde-escuro);
    color: var(--amarelo);
    border: none;
    border-radius: 8px;
    padding: 9px 20px;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    cursor: pointer;
  }

  #card-preview {
    background: #1a6b2f;
    border-radius: 16px;
    overflow: hidden;
    max-width: 480px;
    font-family: 'Inter', sans-serif;
  }
  .card-h {
    background: #0d4a1f;
    padding: 16px 20px 14px;
    text-align: center;
  }
  .card-h .ct { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--amarelo); text-transform: uppercase; }
  .card-h .cr { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: #fff; margin-top: 2px; }
  .card-h .cd { font-size: 12px; color: #9fd9a8; margin-top: 2px; }
  .card-sec-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #9fd9a8; padding: 10px 20px 6px; }
  .card-jogos { padding: 0 12px 8px; display: flex; flex-direction: column; gap: 6px; }
  .card-jogo-row {
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #fff;
    font-weight: 600;
  }
  .card-time { flex: 1; }
  .card-time.r { text-align: right; }
  .card-placar-badge {
    background: var(--amarelo);
    color: #0d4a1f;
    border-radius: 6px;
    padding: 4px 10px;
    font-weight: 700;
    font-size: 14px;
    min-width: 52px;
    text-align: center;
    font-family: 'Oswald', sans-serif;
  }
  .card-divider { height: 0.5px; background: rgba(255,255,255,0.15); margin: 4px 20px; }
  .card-pts-label { font-size: 10px; color: #9fd9a8; text-align: right; padding: 0 20px 4px; }
  .card-ranking { padding: 0 12px 16px; display: flex; flex-direction: column; gap: 5px; }
  .card-rank-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 13px;
  }
  .card-rank-row.c1 { background: rgba(245,212,66,0.2); border: 0.5px solid rgba(245,212,66,0.4); }
  .card-rank-row.cn { background: rgba(255,255,255,0.06); }
  .card-pos { font-size: 12px; font-weight: 600; min-width: 22px; color: #9fd9a8; text-align: center; }
  .card-pos.g { color: var(--amarelo); font-size: 14px; }
  .card-nome { flex: 1; color: #fff; font-weight: 600; }
  .card-pts-rodada { font-size: 11px; color: #9fd9a8; background: rgba(255,255,255,0.1); border-radius: 4px; padding: 2px 6px; }
  .card-pts-total { font-size: 14px; font-weight: 700; font-family: 'Oswald', sans-serif; color: var(--amarelo); min-width: 28px; text-align: right; }
  .card-footer {
    background: #0d4a1f;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-footer-tag { font-size: 12px; font-weight: 600; color: var(--amarelo); letter-spacing: 0.5px; font-family: 'Oswald', sans-serif; }
  .card-footer-sub { font-size: 11px; color: #9fd9a8; }

  /* Responsive */
  @media (max-width: 600px) {
    .main { padding: 12px 12px; }
    .tabs { padding: 0 12px; overflow-x: auto; }
    .tab { font-size: 12px; padding: 10px 12px 8px; }
    .ranking-header, .ranking-row { grid-template-columns: 36px 1fr repeat(3, 50px); }
    .ranking-header .hide-mobile, .ranking-row .hide-mobile { display: none; }
    .time-nome { min-width: 80px; font-size: 13px; }
  }

  /* ============ MATA-MATA ============ */
  .mm-section-title {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--verde-escuro);
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
  }
  .mm-controls-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .mm-control-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 180px;
  }
  .mm-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .mm-input {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: var(--texto);
    background: #fff;
    transition: border-color 0.2s;
  }
  .mm-input:focus {
    outline: none;
    border-color: var(--verde-campo);
  }
  .mm-table-wrap { overflow-x: auto; border-radius: 10px; margin-bottom: 8px; }
  .mm-bracket-placeholder {
    background: var(--verde-escuro);
    border-radius: 12px;
    padding: 32px 24px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    color: #c8e8cc;
  }
  .mm-bracket-icon { font-size: 32px; flex-shrink: 0; }
  .mm-bracket-text { font-size: 14px; line-height: 1.6; }

  /* ============ PRÉ-JOGO ============ */
  .pj-jogo-picker { margin-bottom: 16px; }
  .pj-picker-label {
    font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
  }
  .pj-jogos-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .pj-jogo-check {
    display: flex; align-items: center; gap: 10px;
    background: #fff; border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px 14px; cursor: pointer;
    transition: all 0.15s;
  }
  .pj-jogo-check input[type=checkbox] { accent-color: var(--verde-campo); width: 16px; height: 16px; cursor: pointer; }
  .pj-jogo-check.selected { background: #f0fbf5; border-color: var(--verde-campo); }
  .pj-jogo-label { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
  .pj-grupo-badge {
    font-size: 11px; font-weight: 700; color: var(--verde-campo);
    background: #e8f5ec; padding: 2px 7px; border-radius: 5px;
  }
  .pj-actions { display: flex; gap: 8px; margin-top: 6px; }
  .pj-sel-all {
    font-size: 12px; font-weight: 600; padding: 5px 14px;
    border-radius: 6px; border: 1.5px solid var(--border);
    background: #fff; color: var(--muted); cursor: pointer;
  }
  .pj-sel-all:hover { background: var(--cinza); }

  /* Card pré-jogo */
  .pjc-card {
    background: #1a6b2f; border-radius: 16px; overflow: hidden;
    max-width: 480px; font-family: 'Inter', sans-serif;
  }
  .pjc-header {
    background: #0d4a1f; padding: 16px 20px 14px; text-align: center;
  }
  .pjc-header-tag {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    color: var(--amarelo); text-transform: uppercase;
  }

// STATE  (carregado do resultados.json)
// ============================================================
let STATE = { resultados: {}, grupos: {}, matamata: {} };

async function loadState() {
  try {
    const r = await fetch('resultados.json?t=' + Date.now());
    if (!r.ok) throw new Error('não encontrado');
    const data = await r.json();
    STATE.resultados = data.resultados  || {};
    STATE.grupos     = data.grupos      || {};
    STATE.matamata   = data.matamata    || {};
    // normalise keys to int
    const norm = {};
    Object.entries(STATE.resultados).forEach(([k,v]) => { norm[parseInt(k)] = v; });
    STATE.resultados = norm;
  } catch(e) {
    console.warn('resultados.json não carregado:', e.message);
  }
}

// Admin-only: gera o JSON atualizado para download
function saveState(s) {
  if (!IS_ADMIN) return;
  const blob = new Blob([JSON.stringify(s, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'resultados.json';
  a.click();
}

// ============================================================
// UTILS
// ============================================================
function getRodada(id) {
  if (id <= 23) return 1;
  if (id <= 47) return 2;
  return 3;
}
function getResultado(id) { return STATE.resultados[id] || null; }

function calcPoints(palp, res) {
  if (!res || palp[0] === null || palp[1] === null) return null;
  if (palp[0] === res[0] && palp[1] === res[1]) return 3;
  const resSide = res[0] > res[1] ? 'H' : res[0] < res[1] ? 'A' : 'D';
  const palSide = palp[0] > palp[1] ? 'H' : palp[0] < palp[1] ? 'A' : 'D';
  if (resSide === palSide) return 1;
  return 0;
}

function scoreFor(name) {
  let total = 0, exatos = 0, certos = 0, jogosComResultado = 0;
  for (let i = 0; i < 72; i++) {
    const res = getResultado(i);
    if (!res) continue;
    const palp = PALPITES[name][i];
    const pts = calcPoints(palp, res);
    if (pts === null) continue;
    jogosComResultado++;
    total += pts;
    if (pts === 3) exatos++;
    if (pts === 1) certos++;
  }
  return {total, exatos, certos, jogosComResultado};
}

function fmtDate(d) {
  const dt = new Date(d + 'T12:00:00');
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago'];
  return `${dias[dt.getDay()]}, ${dt.getDate()} ${meses[dt.getMonth()]}`;
}

function checkInput(id) {
  const h = document.getElementById('h-'+id);
  const a = document.getElementById('a-'+id);
  const btn = document.getElementById('salvar-btn-'+id);
  const hv = h.value.trim(), av = a.value.trim();
  const ok = hv !== '' && av !== '' && !isNaN(parseInt(hv)) && !isNaN(parseInt(av));
  btn.disabled = !ok;
  if (hv !== '') h.classList.add('filled'); else h.classList.remove('filled');
  if (av !== '') a.classList.add('filled'); else a.classList.remove('filled');
}

function handleKey(e, id) {
  if (e.key === 'Enter') salvarResultado(id);
}

function salvarResultado(id) {
  if (!IS_ADMIN) return;
  const hv = parseInt(document.getElementById('h-'+id).value);
  const av = parseInt(document.getElementById('a-'+id).value);
  if (isNaN(hv) || isNaN(av)) return;
  STATE.resultados[id] = [hv, av];
  saveState(STATE);

  document.getElementById('input-box-'+id).style.display = 'none';
  document.getElementById('salvar-btn-'+id).style.display = 'none';
  const badge = document.getElementById('res-badge-'+id);
  badge.textContent = `${hv} × ${av}`;

}

function editarResultado(id) {
  if (!IS_ADMIN) return;
  delete STATE.resultados[id];
  saveState(STATE);
  const badge = document.getElementById('res-badge-'+id);
  badge.classList.remove('show');
  document.getElementById('input-box-'+id).style.display = 'flex';
  document.getElementById('salvar-btn-'+id).style.display = 'block';
  document.getElementById('salvar-btn-'+id).disabled = true;
  document.getElementById('editar-btn-'+id).classList.remove('show');
  document.getElementById('h-'+id).value = '';
  document.getElementById('a-'+id).value = '';
  document.getElementById('h-'+id).classList.remove('filled');
  document.getElementById('a-'+id).classList.remove('filled');
  document.getElementById('jogos-count').textContent = `${Object.keys(STATE.resultados).length}/72 jogos`;
}

const GRUPOS_DEF = {
  A: ["México","Coreia do Sul","África do Sul","Tchéquia"],
  B: ["Canadá","Suíça","Catar","Bósnia"],
  C: ["Brasil","Escócia","Marrocos","Haiti"],
  D: ["Estados Unidos","Austrália","Paraguai","Turquia"],
  E: ["Alemanha","Costa do Marfim","Equador","Curaçao"],
  F: ["Holanda","Japão","Suécia","Tunísia"],
  G: ["Bélgica","Irã","Egito","Nova Zelândia"],
  H: ["Espanha","Uruguai","Arábia Saudita","Cabo Verde"],
  I: ["França","Senegal","Noruega","Iraque"],
  J: ["Argentina","Áustria","Argélia","Jordânia"],
  K: ["Portugal","Colômbia","Uzbequistão","RD Congo"],
  L: ["Inglaterra","Croácia","Gana","Panamá"]
};

function calcGrupoStats(grupo) {
  const times = GRUPOS_DEF[grupo];
  const stats = {};
  times.forEach(t => { stats[t] = {pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0}; });

  JOGOS.filter(j => j.group === grupo).forEach(j => {
    const res = getResultado(j.id);
    if (!res) return;
    const [gh, ga] = res;
    const h = j.home, a = j.away;
    if (!stats[h] || !stats[a]) return;
    stats[h].j++; stats[a].j++;
    stats[h].gp += gh; stats[h].gc += ga;
    stats[a].gp += ga; stats[a].gc += gh;
    stats[h].sg += (gh-ga); stats[a].sg += (ga-gh);
    if (gh > ga) { stats[h].pts+=3; stats[h].v++; stats[a].d++; }
    else if (gh < ga) { stats[a].pts+=3; stats[a].v++; stats[h].d++; }
    else { stats[h].pts+=1; stats[a].pts+=1; stats[h].e++; stats[a].e++; }
  });

  return times.map(t => ({name:t, ...stats[t]})).sort((a,b) => b.pts-a.pts || b.sg-a.sg || b.gp-a.gp);
}

function renderGrupos() {
  const container = document.getElementById('grupos-container');

    (manual || sorted).forEach((t, i) => {
      const cls = i < 2 ? 'classificado' : '';
      const nome = typeof t === 'string' ? t : t.name;
      const st = typeof t === 'string' ? sorted.find(s => s.name === t) || {j:0,pts:0,sg:0,gp:0} : t;
      html += `<tr class="${cls}">
        <td class="nome">${nome}</td>
        <td>${st.j}</td><td>${st.pts}</td><td>${st.sg > 0 ? '+':''  }${st.sg}</td><td>${st.gp}</td>

    html += `</tbody></table>

      </div>

  });
  container.innerHTML = html;
}

function toggleGrupoEdit(g) {
  const el = document.getElementById('grupo-edit-' + g);
  el.classList.toggle('open');
}

function salvarGrupo(g) {
  if (!IS_ADMIN) return;
  const times = GRUPOS_DEF[g];
  const posMap = {};
  times.forEach((t, i) => {
    const v = parseInt(document.getElementById(`gpos-${g}-${i}`).value);
    posMap[v] = t;
  });
  const sorted = Object.keys(posMap).sort((a,b) => a-b).map(k => posMap[k]);
  STATE.grupos[g] = sorted.map(name => {
    const stats = calcGrupoStats(g).find(s => s.name === name) || {j:0,pts:0,sg:0,gp:0,j:0};
    return stats;
  });
  saveState(STATE);
  renderGrupos();
}

function resetGrupo(g) {
  if (!IS_ADMIN) return;
  delete STATE.grupos[g];
  saveState(STATE);
  renderGrupos();
}

function renderCardPage() {
  const sel = document.getElementById('card-dia-sel');
  const allDates = [...new Set(JOGOS.map(j => j.date))].sort();
  const prev = sel.value;
  sel.innerHTML = '';
  allDates.forEach(d => {
    const hasRes = JOGOS.filter(j => j.date === d).some(j => getResultado(j.id));
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = fmtDate(d) + (hasRes ? '' : ' (sem resultado)');
    if (!hasRes) opt.style.color = '#aaa';
    sel.appendChild(opt);
  });
  const datesWithRes = allDates.filter(d => JOGOS.filter(j => j.date === d).some(j => getResultado(j.id)));
  if (prev && allDates.includes(prev)) sel.value = prev;
  else if (datesWithRes.length) sel.value = datesWithRes[datesWithRes.length - 1];
  else sel.value = allDates[0];
  gerarCard();
}

function gerarCard() {
  const sel = document.getElementById('card-dia-sel');
  if (!sel || !sel.value) return;
  const dia = sel.value;
  const nextInfo = document.getElementById('card-next-info').value;
  const jogosDia = JOGOS.filter(j => j.date === dia);
  const rodada = getRodada(jogosDia[0].id);
  const scores = PARTICIPANTES.map(n => {
    let diaPts = 0;
    jogosDia.forEach(j => {
      const res = getResultado(j.id);
      if (!res) return;
      const pts = calcPoints(PALPITES[n][j.id], res);
      if (pts !== null) diaPts += pts;
    });
    return {name: n, diaPts, total: scoreFor(n).total};
  }).sort((a,b) => b.total - a.total || b.diaPts - a.diaPts);
  const jogosComRes = jogosDia.filter(j => getResultado(j.id));
  let jogoRows = '';
  jogosComRes.forEach(j => {
    const res = getResultado(j.id);
    jogoRows += `<div class="card-jogo-row">
      <span class="card-time">${j.home}</span>
      <span class="card-placar-badge">${res[0]} x ${res[1]}</span>
      <span class="card-time r">${j.away}</span>
    </div>`;
  });
  if (!jogoRows) jogoRows = '<div style="text-align:center;color:#9fd9a8;font-size:13px;padding:8px">Nenhum resultado ainda nesse dia</div>';
  let rankRows = '';
  scores.slice(0, 8).forEach((s, i) => {
    const posClass = i === 0 ? 'c1' : 'cn';
    const posLabel = i === 0 ? '🥇' : `${i+1}`;
    const posLabelClass = i === 0 ? 'g' : '';
    const ptsSuf = s.diaPts > 0 ? `+${s.diaPts}` : '—';
    rankRows += `<div class="card-rank-row ${posClass}">
      <span class="card-pos ${posLabelClass}">${posLabel}</span>
      <span class="card-nome">${s.name}</span>
      <span class="card-pts-rodada">${ptsSuf}</span>
      <span class="card-pts-total">${s.total}</span>
    </div>`;
  });
  document.getElementById('card-preview').innerHTML = `
    <div class="card-h">
      <div class="ct">Bolão Copa 2026 · Rodada ${rodada}</div>
      <div class="cr">${fmtDate(dia)}</div>
      <div class="cd">${jogosDia.length} jogos · ${jogosComRes.length} resultado${jogosComRes.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="card-sec-label">Jogos do dia</div>
    <div class="card-jogos">${jogoRows}</div>
    <div class="card-divider"></div>
    <div class="card-sec-label">Classificação</div>
    <div class="card-pts-label">pts hoje | total</div>
    <div class="card-ranking">${rankRows}</div>
    <div class="card-footer">
      <span class="card-footer-tag">Copa Du MunDu</span>
      <span class="card-footer-sub">${nextInfo || ''}</span>
    </div>
  `;
  showExportBar('export-bar-card');
}

function normalizeStr(s) {
  if (!s) return '';
  return s.toLowerCase()
    .normalize('NFD').replace(/[\\u0300-\\u036f]/g, '')
    .replace(/vini(cius)?\\s*jr\\.?/i, 'vinicius jr')
    .replace(/mbappe/i, 'mbappe')
    .replace(/kane/i, 'kane')
    .trim();
}

}

function renderMatamata() {

    {field:'campeao',       label:'Campeão',       emoji:'🏆', real: campeaoReal},
    {field:'melhorJogador', label:'Melhor Jogador', emoji:'⭐', real: melhorReal},

  // Controls

  cats.forEach(c => {
    html += `<div class="mm-control-item">
      <label class="mm-label">${c.emoji} ${c.label}</label>

  html += `<div class="mm-section-title" style="margin-top:24px">Palpites Especiais · Fase Final</div>

    <thead><tr>
      <th class="jogo-col">Participante</th>

  const rows = PARTICIPANTES.map(n => {

    const melhorOk     = melhorReal     && normalizeStr(p.melhor)     === normalizeStr(melhorReal);
    const artilheiroOk = artilheiroReal && normalizeStr(p.artilheiro) === normalizeStr(artilheiroReal);

let pjSelectedJogos = new Set();

function initPrejogo() {
  const sel = document.getElementById('pj-dia-sel');
  const allDates = [...new Set(JOGOS.map(j => j.date))].sort();
  const prev = sel.value;
  sel.innerHTML = '';
  allDates.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = fmtDate(d);
    sel.appendChild(opt);
  });
  // Default: first upcoming date (today or future) or last date
  const today = new Date().toISOString().slice(0,10);
  const upcomingDate = allDates.find(d => d >= today);
  if (prev && allDates.includes(prev)) sel.value = prev;
  else if (upcomingDate) sel.value = upcomingDate;
  else sel.value = allDates[allDates.length - 1];
  pjSelectedJogos = new Set();
  renderPrejogo();
}

function renderPrejogo() {
  const dia = document.getElementById('pj-dia-sel').value;
  if (!dia) return;
  const jogosDia = JOGOS.filter(j => j.date === dia);

  // Render jogo checkboxes
  let listHtml = `<div class="pj-jogo-picker">
    <div class="pj-picker-label">Escolha os jogos para o card:</div>
    <div class="pj-jogos-list">`;
  jogosDia.forEach(j => {
    const checked = pjSelectedJogos.has(j.id) ? 'checked' : '';
    listHtml += `<label class="pj-jogo-check ${pjSelectedJogos.has(j.id) ? 'selected' : ''}">
      <input type="checkbox" value="${j.id}" ${checked} onchange="togglePjJogo(${j.id}, this)">
      <span class="pj-jogo-label">
        <span class="pj-grupo-badge">G${j.group}</span>
        <span>${j.home} × ${j.away}</span>
      </span>
    </label>`;
  });
  listHtml += `</div>
    <div class="pj-actions">
      <button class="pj-sel-all" onclick="pjSelectAll('${dia}')">Todos</button>
      <button class="pj-sel-all" onclick="pjClearAll()">Limpar</button>
    </div>
  </div>`;
  document.getElementById('pj-jogo-list').innerHTML = listHtml;

  renderPjeCard();
}

function togglePjJogo(id, cb) {
  if (cb.checked) pjSelectedJogos.add(id);
  else pjSelectedJogos.delete(id);
  // Update label style
  cb.closest('label').classList.toggle('selected', cb.checked);
  renderPjeCard();
}

function pjSelectAll(dia) {
  JOGOS.filter(j => j.date === dia).forEach(j => pjSelectedJogos.add(j.id));
  renderPrejogo();
}

function pjClearAll() {
  pjSelectedJogos.clear();
  renderPrejogo();
}

function renderPjeCard() {
  const preview = document.getElementById('pj-card-preview');
  const dia = document.getElementById('pj-dia-sel').value;
  const selected = [...pjSelectedJogos].sort((a,b) => a-b);

  if (selected.length === 0) {
    preview.innerHTML = '<div style="color:#aaa;font-size:13px;padding:8px 0">Selecione ao menos um jogo acima.</div>';
    return;
  }

  const rodada = getRodada(selected[0]);

  let blocksHtml = '';
  selected.forEach(id => {
    const j = JOGOS[id];
    const info = SCHEDULE_MAP[id] || {};
    const horario = info.hora || '—';
    const canais = info.canais || [];

    // Canal badges — destaque visual por categoria
    const canalBadges = canais.map(c => {
      const isGlobo   = c.includes('Globo') && !c.includes('Globoplay');
      const isCaze    = c.includes('Cazé');
      const isGloboplay = c.includes('Globoplay');
      const isSBT     = c.includes('SBT');
      const isSporTV  = c.includes('SporTV');
      const isNSports = c.includes('N Sports') || c.includes('N Sports');
      const isGe      = c.includes('ge tv');
      let cls = 'pjc-canal-other';
      if (isGlobo) cls = 'pjc-canal-globo';
      else if (isCaze) cls = 'pjc-canal-caze';
      else if (isSBT) cls = 'pjc-canal-sbt';
      else if (isSporTV) cls = 'pjc-canal-sportv';
      else if (isNSports) cls = 'pjc-canal-nsports';
      else if (isGloboplay) cls = 'pjc-canal-globoplay';
      else if (isGe) cls = 'pjc-canal-ge';
      return `<span class="pjc-canal-badge ${cls}">${c}</span>`;
    }).join('');

    const rows = PARTICIPANTES.map(n => {
      const p = PALPITES[n][id];
      return {name: n, palp: p};
    });

    blocksHtml += `
    <div class="pjc-jogo-block">
      <div class="pjc-jogo-header">
        <span class="pjc-grupo">G${j.group}</span>
        <span class="pjc-time">${j.home}</span>
        <span class="pjc-vs">×</span>
        <span class="pjc-time">${j.away}</span>
      </div>
      <div class="pjc-horario-row">
        <span class="pjc-hora">🕐 ${horario}</span>
        <div class="pjc-canais">${canalBadges || '<span class="pjc-canal-badge pjc-canal-other">A confirmar</span>'}</div>
      </div>
      <div class="pjc-palpites-grid">
        ${rows.map(r => `
        <div class="pjc-pal-item">
          <span class="pjc-nome">${r.name.split(' ')[0]}</span>
          <span class="pjc-score">${r.palp && r.palp[0] !== null ? r.palp[0]+'-'+r.palp[1] : '—'}</span>
        </div>`).join('')}
      </div>
    </div>`;
  });

  preview.innerHTML = `
  <div class="pjc-card">
    <div class="pjc-header">
      <div class="pjc-header-tag">Bolão Copa 2026 · Rodada ${rodada}</div>
      <div class="pjc-header-date">${fmtDate(dia)}</div>
      <div class="pjc-header-sub">Palpites do grupo</div>
    </div>
    <div class="pjc-body">
      ${blocksHtml}
    </div>
    <div class="pjc-footer">
      <span class="card-footer-tag">Copa Du MunDu</span>
    </div>
  </div>`;
  showExportBar('export-bar-pj');
}

async function captureCard(previewId) {
  const el = document.querySelector('#' + previewId + ' > div');
  if (!el) return null;
  const canvas = await html2canvas(el, {
    scale: 3,
    useCORS: true,
    backgroundColor: null,
    logging: false
  });
  return canvas;
}

async function exportCard(previewId, filename) {
  const btns = document.querySelectorAll('.export-btn');
  btns.forEach(b => b.disabled = true);
  try {
    const canvas = await captureCard(previewId);
    if (!canvas) return;
    const link = document.createElement('a');
    const date = new Date().toISOString().slice(0,10);
    link.download = `bolao_${filename}_${date}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

async function copyCard(previewId, statusId) {
  const btns = document.querySelectorAll('.export-btn');
  btns.forEach(b => b.disabled = true);
  const status = document.getElementById(statusId);
  status.textContent = 'Copiando...';
  try {
    const canvas = await captureCard(previewId);
    if (!canvas) return;
    canvas.toBlob(async blob => {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        status.textContent = '✓ Copiado!';
        setTimeout(() => status.textContent = '', 3000);
      } catch(e) {
        // Fallback: download if clipboard not supported
        const link = document.createElement('a');
        link.download = `bolao_card.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        status.textContent = '⚠ Clipboard não suportado — baixando...';
        setTimeout(() => status.textContent = '', 4000);
      } finally {
        btns.forEach(b => b.disabled = false);
      }
    }, 'image/png');
  } catch(e) {
    status.textContent = 'Erro ao capturar';
    btns.forEach(b => b.disabled = false);
  }
}

// Show export bar after card is generated
function showExportBar(barId) {
  const bar = document.getElementById(barId);
  if (bar) bar.style.display = 'flex';
}

    IS_ADMIN = true;
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
  }
  await loadState();
  renderJogos();
