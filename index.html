<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026 · Copa Du MunDu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --wc-red:     #c1272d;
    --wc-blue:    #003087;
    --wc-gold:    #f5a623;
    --verde-escuro: #0a3622;
    --verde-campo:  #1a6b2f;
    --verde-medio:  #2d8c47;
    --amarelo:      #f5d442;
    --amarelo-claro:#fef08a;
    --branco:       #f8f9f0;
    --cinza:        #e8ead8;
    --texto:        #0a3622;
    --muted:        #4a7c5e;
    --card-bg:      #ffffff;
    --border:       #d0dcc8;
    --shadow:       0 2px 12px rgba(10,54,34,0.08);
    --radius:       12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #eef2e8;
    color: var(--texto);
    min-height: 100vh;
  }

  /* ===================== ADMIN BAR ===================== */

  /* Admin badge */

  /* Unsaved warning */
  #save-all-btn {
    background: #f59e0b; color: #7c2d12;
    border: none; border-radius: 8px;
    padding: 8px 20px;
    font-family: 'Oswald', sans-serif;
    font-weight: 700; font-size: 14px; letter-spacing: 0.5px;
    cursor: pointer;
    white-space: nowrap;
  }
  #save-all-btn:hover { background: #fbbf24; }

  /* ===================== HEADER ===================== */
  .header {
    background: var(--verde-escuro);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 3px solid var(--amarelo);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 200px; height: 100%;
    background: linear-gradient(135deg, transparent 40%, rgba(245,212,66,0.06) 100%);
    pointer-events: none;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-emblem {
    width: 44px; height: 44px;
    background: var(--amarelo);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .header-titles h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--amarelo); letter-spacing: 1.5px; line-height: 1;
  }
  .header-titles p {
    font-size: 11px; color: #9fd9a8; margin-top: 3px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .header-badge {
    background: rgba(245,212,66,0.15);
    border: 1.5px solid rgba(245,212,66,0.4);
    color: var(--amarelo);
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 13px; padding: 5px 12px;
    border-radius: 20px; letter-spacing: 0.5px;
    white-space: nowrap;
  }

  /* ===================== TABS ===================== */
  .tabs {
    background: var(--verde-escuro);
    display: flex;
    gap: 0;
    padding: 0 20px;
    overflow-x: auto;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-family: 'Oswald', sans-serif; font-size: 13px;
    font-weight: 600; letter-spacing: 0.5px;
    color: #6aaf7a; padding: 11px 16px 9px;
    cursor: pointer; border-bottom: 3px solid transparent;
    transition: all 0.2s; text-transform: uppercase;
    white-space: nowrap; flex-shrink: 0;
  }
  .tab:hover { color: #d0f0d8; }
  .tab.active { color: var(--amarelo); border-bottom-color: var(--amarelo); }

  /* ===================== MAIN ===================== */
  .main { padding: 18px 20px; max-width: 1100px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  /* ===================== JOGOS ===================== */
  .day-block { margin-bottom: 22px; }
  .day-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .day-label {
    font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--verde-escuro); text-transform: uppercase; letter-spacing: 1px;
    white-space: nowrap;
  }
  .day-line { flex: 1; height: 1px; background: var(--border); }
  .rodada-badge {
    font-size: 10px; font-weight: 700; color: var(--muted);
    background: var(--cinza); padding: 2px 9px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
    border: 1px solid var(--border);
  }

  .jogo-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    margin-bottom: 5px;
    display: flex; align-items: center; gap: 10px;
    transition: box-shadow 0.15s, border-color 0.15s;
    box-shadow: var(--shadow);
  }
  .jogo-card:hover { border-color: #aac8a0; box-shadow: 0 3px 16px rgba(10,54,34,0.12); }
  .jogo-card.pending { border-left: 3px solid #d1fae5; }
  .jogo-num {
    font-size: 10px; color: #aaa; min-width: 22px; font-weight: 600; flex-shrink: 0;
  }
  .jogo-grupo {
    font-size: 10px; font-weight: 700; color: var(--verde-campo);
    background: #e8f5ec; padding: 2px 6px; border-radius: 5px;
    min-width: 26px; text-align: center; flex-shrink: 0;
  }
  .jogo-times {
    flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0;
  }
  .time-nome {
    font-size: 14px; font-weight: 600; color: var(--texto);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .time-nome.left { flex: 1; text-align: left; }
  .time-nome.right { flex: 1; text-align: right; }
  .time-flag { font-size: 16px; flex-shrink: 0; }



  .resultado-badge {
    display: none; align-items: center; gap: 6px;
    background: var(--verde-escuro); color: var(--amarelo);
    font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700;
    padding: 5px 12px; border-radius: 7px; letter-spacing: 1px;
    flex-shrink: 0;
  }
  .resultado-badge.show { display: flex; }
  .resultado-badge.staged-badge {
    background: #b45309; color: #fef3c7;
  }


  /* ===================== RANKING ===================== */
  .section-header {
    font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700;
    color: var(--verde-escuro); letter-spacing: 0.5px;
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .ranking-header {
    display: grid;
    grid-template-columns: 44px 1fr repeat(5, 60px);
    gap: 6px; padding: 6px 16px;
    font-size: 10px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .ranking-row {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius);
    display: grid; grid-template-columns: 44px 1fr repeat(5, 60px);
    gap: 6px; padding: 11px 16px; margin-bottom: 5px;
    align-items: center; transition: box-shadow 0.15s;
    box-shadow: var(--shadow);
  }
  .ranking-row:hover { box-shadow: 0 3px 14px rgba(10,54,34,0.12); }
  .ranking-row.top1 { border-left: 4px solid var(--amarelo); background: linear-gradient(135deg, #fffde0 0%, #fff 100%); }
  .ranking-row.top2 { border-left: 4px solid #c0c0c0; }
  .ranking-row.top3 { border-left: 4px solid #cd7f32; }
  .pos-badge {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px;
  }
  .pos-badge.p1 { background: var(--amarelo); color: var(--verde-escuro); }
  .pos-badge.p2 { background: #e8e8e8; color: #444; }
  .pos-badge.p3 { background: #f0e0cc; color: #7a4010; }
  .pos-badge.pn { background: #f0f4ec; color: var(--muted); }
  .rank-nome { font-size: 14px; font-weight: 600; color: var(--texto); }
  .rank-stat { text-align: center; font-size: 13px; font-weight: 600; color: var(--texto); }
  .rank-total {
    text-align: center; font-size: 17px; font-weight: 700;
    font-family: 'Oswald', sans-serif; color: var(--verde-campo);
  }
  .rank-total.leader { color: var(--verde-escuro); background: var(--amarelo); border-radius: 7px; padding: 2px 8px; }

  /* ===================== PALPITES ===================== */
  .palpites-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-btn {
    font-size: 12px; font-weight: 700; padding: 5px 13px;
    border-radius: 20px; border: 1.5px solid var(--border);
    background: #fff; color: var(--muted); cursor: pointer; transition: all 0.15s;
    font-family: 'Oswald', sans-serif; letter-spacing: 0.3px;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--verde-escuro); color: var(--amarelo); border-color: var(--verde-escuro);
  }
  .palpites-table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
  table.palpites { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; border-radius: var(--radius); overflow: hidden; }
  table.palpites th {
    background: var(--verde-escuro); color: var(--amarelo);
    font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 11px;
    letter-spacing: 0.5px; padding: 10px 8px; text-align: center;
    white-space: nowrap;
  }
  table.palpites th.jogo-col { text-align: left; min-width: 180px; position: sticky; left: 0; z-index: 3; background: var(--verde-escuro); }
  table.palpites td { padding: 7px 8px; border-bottom: 1px solid #f0f4ec; text-align: center; white-space: nowrap; }
  table.palpites td.jogo-col { text-align: left; font-weight: 600; font-size: 12px; color: var(--texto); padding-left: 12px; position: sticky; left: 0; z-index: 1; background: #fff; box-shadow: 2px 0 4px rgba(0,0,0,0.08); }
  table.palpites tr:last-child td { border-bottom: none; }
  table.palpites tr:hover td { background: #f5fbf0; }
  .pal-cell { font-weight: 600; color: #666; }
  .pal-cell.exato { color: #166534; background: #dcfce7; border-radius: 4px; padding: 1px 4px; }
  .pal-cell.certo { color: #854d0e; background: #fef9c3; border-radius: 4px; padding: 1px 4px; }
  .pal-cell.errado { color: #ccc; }
  .pal-cell.sem-resultado { color: #bbb; }
  .resultado-col { color: var(--verde-escuro); font-weight: 700; font-family: 'Oswald', sans-serif; font-size: 14px; }

  /* ===================== GRUPOS ===================== */
  .grupos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
  .grupo-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .grupo-titulo {
    background: var(--verde-escuro); color: var(--amarelo);
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px;
    letter-spacing: 1px; padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .grupo-titulo span { font-size: 10px; color: #9fd9a8; font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.5px; }
  table.grupo-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.grupo-table th {
    font-size: 9px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 5px 8px; background: #f5f9f2; text-align: center;
  }
  table.grupo-table th.nome { text-align: left; }
  table.grupo-table td {
    padding: 8px 8px; border-top: 1px solid #f0f4ec;
    text-align: center; font-weight: 600; color: var(--texto);
  }
  table.grupo-table td.nome {
    text-align: left; font-weight: 600; padding-left: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  table.grupo-table tr.classificado td { background: #f0fbf5; }
  table.grupo-table tr.classificado td.nome::before {
    content: ''; width: 4px; height: 4px; border-radius: 50%;
    background: var(--verde-campo); display: inline-block; flex-shrink: 0;
  }

  /* ===================== MATA-MATA ===================== */
  .mm-section-title {
    font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700;
    color: var(--verde-escuro); letter-spacing: 0.5px;
    margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid var(--border);
  }
  .mm-table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 8px; }
  .mm-bracket-placeholder {
    background: var(--verde-escuro); border-radius: var(--radius);
    padding: 28px 22px; display: flex; gap: 14px; align-items: flex-start; color: #c8e8cc;
  }
  .mm-bracket-icon { font-size: 28px; flex-shrink: 0; }
  .mm-bracket-text { font-size: 13px; line-height: 1.6; }

  /* ===================== CARD ===================== */
  #card-preview { background: #1a6b2f; border-radius: 14px; overflow: hidden; max-width: 480px; font-family: 'Inter', sans-serif; }
  .card-h { background: #0d4a1f; padding: 15px 20px 13px; text-align: center; }
  .card-h .ct { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--amarelo); text-transform: uppercase; }
  .card-h .cr { font-family: 'Oswald', sans-serif; font-size: 21px; font-weight: 700; color: #fff; margin-top: 2px; }
  .card-h .cd { font-size: 11px; color: #9fd9a8; margin-top: 2px; }
  .card-sec-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #9fd9a8; padding: 9px 20px 5px; }
  .card-jogos { padding: 0 12px 8px; display: flex; flex-direction: column; gap: 5px; }
  .card-jogo-row { background: rgba(255,255,255,0.08); border-radius: 7px; padding: 8px 11px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #fff; font-weight: 600; }
  .card-time { flex: 1; }
  .card-time.r { text-align: right; }
  .card-placar-badge { background: var(--amarelo); color: #0d4a1f; border-radius: 5px; padding: 3px 9px; font-weight: 700; font-size: 13px; min-width: 48px; text-align: center; font-family: 'Oswald', sans-serif; }
  .card-divider { height: 0.5px; background: rgba(255,255,255,0.15); margin: 4px 20px; }
  .card-pts-label { font-size: 9px; color: #9fd9a8; text-align: right; padding: 0 20px 4px; }
  .card-ranking { padding: 0 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .card-rank-row { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 7px; font-size: 12px; }
  .card-rank-row.c1 { background: rgba(245,212,66,0.2); border: 0.5px solid rgba(245,212,66,0.4); }
  .card-rank-row.cn { background: rgba(255,255,255,0.06); }
  .card-pos { font-size: 11px; font-weight: 600; min-width: 20px; color: #9fd9a8; text-align: center; }
  .card-pos.g { color: var(--amarelo); font-size: 13px; }
  .card-nome { flex: 1; color: #fff; font-weight: 600; }
  .card-pts-rodada { font-size: 10px; color: #9fd9a8; background: rgba(255,255,255,0.1); border-radius: 4px; padding: 2px 5px; }
  .card-pts-total { font-size: 13px; font-weight: 700; font-family: 'Oswald', sans-serif; color: var(--amarelo); min-width: 26px; text-align: right; }
  .card-footer { background: #0d4a1f; padding: 9px 18px; display: flex; justify-content: space-between; align-items: center; }
  .card-footer-tag { font-size: 11px; font-weight: 700; color: var(--amarelo); letter-spacing: 0.5px; font-family: 'Oswald', sans-serif; }
  .card-footer-sub { font-size: 10px; color: #9fd9a8; }

  /* ===================== PRÉ-JOGO ===================== */
  .pj-jogo-picker { margin-bottom: 14px; }
  .pj-picker-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .pj-jogos-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
  .pj-jogo-check { display: flex; align-items: center; gap: 10px; background: #fff; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 13px; cursor: pointer; transition: all 0.15s; }
  .pj-jogo-check input[type=checkbox] { accent-color: var(--verde-campo); width: 15px; height: 15px; cursor: pointer; }
  .pj-jogo-check.selected { background: #f0fbf5; border-color: var(--verde-campo); }
  .pj-jogo-label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
  .pj-grupo-badge { font-size: 10px; font-weight: 700; color: var(--verde-campo); background: #e8f5ec; padding: 2px 6px; border-radius: 5px; }
  .pj-actions { display: flex; gap: 8px; margin-top: 4px; }
  .pj-sel-all { font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 6px; border: 1.5px solid var(--border); background: #fff; color: var(--muted); cursor: pointer; }
  .pj-sel-all:hover { background: var(--cinza); }
  .pjc-card { background: #1a6b2f; border-radius: 14px; overflow: hidden; max-width: 480px; font-family: 'Inter', sans-serif; }
  .pjc-header { background: #0d4a1f; padding: 15px 20px 13px; text-align: center; }
  .pjc-header-tag { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--amarelo); text-transform: uppercase; }
  .pjc-header-date { font-family: 'Oswald', sans-serif; font-size: 21px; font-weight: 700; color: #fff; margin-top: 2px; }
  .pjc-header-sub { font-size: 11px; color: #9fd9a8; margin-top: 2px; }
  .pjc-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 9px; }
  .pjc-jogo-block { background: rgba(255,255,255,0.07); border-radius: 9px; overflow: hidden; }
  .pjc-jogo-header { background: rgba(0,0,0,0.25); padding: 8px 13px; display: flex; align-items: center; gap: 8px; }
  .pjc-grupo { font-size: 9px; font-weight: 700; color: #0d4a1f; background: var(--amarelo); padding: 2px 5px; border-radius: 4px; }
  .pjc-time { font-size: 13px; font-weight: 700; color: #fff; flex: 1; }
  .pjc-time:last-of-type { text-align: right; }
  .pjc-vs { font-size: 12px; color: #9fd9a8; font-weight: 600; }
  .pjc-horario-row { display: flex; align-items: center; gap: 7px; padding: 5px 13px 4px; flex-wrap: wrap; border-top: 1px solid rgba(255,255,255,0.08); }
  .pjc-hora { font-size: 12px; font-weight: 700; color: var(--amarelo); white-space: nowrap; flex-shrink: 0; }
  .pjc-canais { display: flex; gap: 3px; flex-wrap: wrap; }
  .pjc-canal-badge { font-size: 8px; font-weight: 700; letter-spacing: 0.3px; padding: 2px 5px; border-radius: 3px; white-space: nowrap; text-transform: uppercase; }
  .pjc-canal-globo    { background: #e00; color: #fff; }
  .pjc-canal-sbt      { background: #00a; color: #fff; }
  .pjc-canal-sportv   { background: #f80; color: #fff; }
  .pjc-canal-caze     { background: #a259ff; color: #fff; }
  .pjc-canal-nsports  { background: #0af; color: #fff; }
  .pjc-canal-ge       { background: #1a6b2f; color: var(--amarelo); border: 1px solid var(--amarelo); }
  .pjc-canal-other    { background: rgba(255,255,255,0.15); color: #fff; }
  .pjc-palpites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 1px; padding: 7px 9px; }
  .pjc-pal-item { display: flex; flex-direction: column; align-items: center; padding: 5px 3px; gap: 2px; }
  .pjc-nome { font-size: 9px; font-weight: 600; color: #9fd9a8; text-transform: uppercase; letter-spacing: 0.3px; }
  .pjc-score { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: var(--amarelo); }
  .pjc-footer { background: #0d4a1f; padding: 9px 18px; }

  /* ===================== EXPORT ===================== */

  /* ===================== VISITOR NOTICE ===================== */
  .visitor-result-display {
    display: flex; align-items: center; justify-content: center;
    background: var(--verde-escuro); color: var(--amarelo);
    font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700;
    padding: 5px 12px; border-radius: 7px; letter-spacing: 1px;
    flex-shrink: 0;
  }
  .visitor-pending {
    font-size: 11px; color: #bbb; font-style: italic;
    padding: 2px 6px; flex-shrink: 0;
  }


  /* ===================== ACCORDION ===================== */
  .accordion-btn {
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; font-size: 13px;
    color: var(--muted); cursor: pointer; flex-shrink: 0;
    transition: all 0.15s; line-height: 1;
  }
  .accordion-btn:hover { background: var(--cinza); color: var(--texto); }
  .accordion-btn.open { background: var(--verde-escuro); color: var(--amarelo); border-color: var(--verde-escuro); }
  .accordion-body {
    background: #f5f9f2; border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 var(--radius) var(--radius);

// Parse CSV respeitando campos entre aspas
function parseCSVLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.trim());
  return cols;
}

async function loadState() {
  const bust = '&t=' + Date.now();

  // ── resultados.json (grupos/matamata states) ─────────────────────────
  try {
    const r = await fetch('resultados.json?t=' + Date.now());
    if (r.ok) {
      const data = await r.json();
      STATE.grupos   = data.grupos   || {};
      STATE.matamata = data.matamata || {};
    }
  } catch(e) {}

  // ── Carregar resultados e gabarito MM em paralelo ────────────────────
  const [resPlacares, resMM] = await Promise.allSettled([
    fetch(SHEETS_CSV_URL + bust),
    fetch(SHEETS_MM_URL  + bust),
  ]);

  // ── Placares (resultados) ─────────────────────────────────────────────
  try {
    if (resPlacares.status !== 'fulfilled') throw new Error('fetch falhou');
    const r = resPlacares.value;
    if (!r.ok) throw new Error();
    const lines = (await r.text()).trim().split('\n').slice(1);
    const norm = {};
    lines.forEach(line => {
      const c = parseCSVLine(line);
      const id = parseInt(c[0]);
      const gh = (c[3]||'').trim(), ga = (c[4]||'').trim();
      if (!isNaN(id) && gh !== '' && ga !== '') {
        const h = parseInt(gh), a = parseInt(ga);
        if (!isNaN(h) && !isNaN(a)) norm[id] = [h, a];
      }
    });
    STATE.resultados = norm;
    console.log(`✓ Placares: ${Object.keys(norm).length} resultados`);
  } catch(e) { console.warn('Placares não carregados (provável bloqueio CORS se aberto via file://)'); }

  // Palpites grupos: hardcoded no HTML

  // Palpites MM: hardcoded no HTML

  // ── Gabarito mata-mata ────────────────────────────────────────────────
  try {
    if (resMM.status !== 'fulfilled') throw new Error('fetch falhou');
    const r = resMM.value;
    if (!r.ok) throw new Error();
    const lines = (await r.text()).trim().split('\n').slice(1);
    const mm = {};
    lines.forEach(line => {
      const c = parseCSVLine(line);
      const id = parseInt(c[0]);
      if (isNaN(id)) return;
      const pA = (c[5]||'').trim(), pB = (c[6]||'').trim();
      mm[id] = {
        timeA: (c[1]||'').trim(), timeB: (c[2]||'').trim(),
        golsA: (c[3]||'')!==''?parseInt(c[3]):null,
        golsB: (c[4]||'')!==''?parseInt(c[4]):null,
        penaltisA: pA!==''?parseInt(pA):null,
        penaltisB: pB!==''?parseInt(pB):null,
      };
    });
    STATE.gabarito_mm = mm;
    console.log(`✓ Gabarito MM: ${Object.keys(mm).length} jogos`);
  } catch(e) { console.warn('Gabarito MM não carregado (provável bloqueio CORS se aberto via file://)'); }
}

function getResultado(id) {
  return STATE.resultados[id] || null;
}


// ============================================================
// UTILS
// ============================================================
function getRodada(id) {
  if (id <= 23) return 1; if (id <= 47) return 2; return 3;
}
function calcPoints(palp, res) {
  if (!res || palp[0] === null || palp[1] === null) return null;
  if (palp[0] === res[0] && palp[1] === res[1]) return 3;
  const resSide = res[0] > res[1] ? 'H' : res[0] < res[1] ? 'A' : 'D';
  const palSide = palp[0] > palp[1] ? 'H' : palp[0] < palp[1] ? 'A' : 'D';
  if (resSide === palSide) return 1;
  return 0;
}
function scoreFor(name) {
  let total = 0, exatos = 0, certos = 0, jogosComResultado = 0;
  for (let i = 0; i < 72; i++) {
    const res = getResultado(i);
    if (!res) continue;
    const palp = PALPITES[name][i];
    const pts = calcPoints(palp, res);
    if (pts === null) continue;
    jogosComResultado++; total += pts;
    if (pts === 3) exatos++;
    if (pts === 1) certos++;
  }
  // Add MM points
  const mm = scoreMM(name);
  total += mm.total;
  return {total, exatos, certos, jogosComResultado};
}
function fmtDate(d) {
  const dt = new Date(d + 'T12:00:00');
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago'];
  return `${dias[dt.getDay()]}, ${dt.getDate()} ${meses[dt.getMonth()]}`;
}

  A:["México","Coreia do Sul","África do Sul","Tchéquia"],
  B:["Canadá","Suíça","Catar","Bósnia"],
  C:["Brasil","Escócia","Marrocos","Haiti"],
  D:["Estados Unidos","Austrália","Paraguai","Turquia"],
  E:["Alemanha","Costa do Marfim","Equador","Curaçao"],
  F:["Holanda","Japão","Suécia","Tunísia"],
  G:["Bélgica","Irã","Egito","Nova Zelândia"],
  H:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"],
  I:["França","Senegal","Noruega","Iraque"],
  J:["Argentina","Áustria","Argélia","Jordânia"],
  K:["Portugal","Colômbia","Uzbequistão","RD Congo"],
  L:["Inglaterra","Croácia","Gana","Panamá"]
};

function calcGrupoStats(grupo) {
  const times = GRUPOS_DEF[grupo];
  const stats = {};
  times.forEach(t => { stats[t] = {pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0}; });
  JOGOS.filter(j => j.group===grupo).forEach(j => {
    const res = getResultado(j.id);
    if (!res) return;
    const [gh,ga] = res; const h=j.home,a=j.away;
    if (!stats[h]||!stats[a]) return;
    stats[h].j++;stats[a].j++;stats[h].gp+=gh;stats[h].gc+=ga;stats[a].gp+=ga;stats[a].gc+=gh;
    stats[h].sg+=(gh-ga);stats[a].sg+=(ga-gh);
    if(gh>ga){stats[h].pts+=3;stats[h].v++;stats[a].d++;}
    else if(gh<ga){stats[a].pts+=3;stats[a].v++;stats[h].d++;}
    else{stats[h].pts+=1;stats[a].pts+=1;stats[h].e++;stats[a].e++;}
  });
  return times.map(t=>({name:t,...stats[t]})).sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);
}

function getBracketResult(id) {
  const g = STATE.gabarito_mm[id];
  if (!g || g.golsA === null) return null;
  return g;
}

function bracketMatchHtml(id, labelFallback, isFinal) {
  const g = getBracketResult(id);
  const hasTeams = g && g.timeA && !g.timeA.startsWith('W') && !g.timeA.startsWith('1') &&
                   !g.timeA.startsWith('2') && !g.timeA.includes('Vencedor') && !g.timeA.includes('RU');
  const tA = hasTeams ? g.timeA : (g ? g.timeA : null);
  const tB = hasTeams ? g.timeB : (g ? g.timeB : null);
  const fA = hasTeams ? flag(tA) : '';
  const fB = hasTeams ? flag(tB) : '';
  const date = FASE_DATES[id] ? `<span style="font-size:9px;color:var(--muted)">${FASE_DATES[id]}</span>` : '';

  let scoreHtml = '';
  if (g && g.golsA !== null) {
    let sc = `${g.golsA}–${g.golsB}`;
    if (g.penaltisA !== null) sc += ` (${g.penaltisA}–${g.penaltisB} pen)`;
    scoreHtml = `<div style="font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;color:var(--amarelo);background:var(--verde-escuro);padding:2px 7px;border-radius:5px;text-align:center;margin:3px 0">${sc}</div>`;
  }

  const nameA = hasTeams ? `${fA} ${tA}` : (tA || labelFallback.split('×')[0].trim());
  const nameB = hasTeams ? `${fB} ${tB}` : (tB || labelFallback.split('×')[1]?.trim()||'');

  const borderColor = isFinal ? 'var(--amarelo)' : 'var(--border)';
  const bg = isFinal ? 'linear-gradient(135deg,#fffde8,#fff)' : '#fff';

  return `<div style="background:${bg};border:1.5px solid ${borderColor};border-radius:9px;padding:7px 10px;min-width:130px;max-width:160px;font-size:11px;font-weight:600;color:var(--texto);box-shadow:var(--shadow)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">${date}<span style="font-size:9px;color:#bbb">J${id}</span></div>
    <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nameA}</div>
    ${scoreHtml}
    <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nameB}</div>
  </div>`;
}

function renderBracket() {
  const container = document.getElementById('bracket-container');
  if (!container) return;

  // Mobile: vertical list by phase
  const isMobile = window.innerWidth < 768;

  let html = `<div class="section-header">🏆 Chaveamento Oficial · Copa 2026</div>`;

  if (isMobile) {
    // Vertical layout for mobile
    const fases = [
      {label:'16 Avos de Final', matches: BRACKET.r16},
      {label:'Oitavas de Final',  matches: BRACKET.qf},
      {label:'Quartas de Final',  matches: BRACKET.sf},
      {label:'Semifinais',        matches: [...BRACKET.final]},
      {label:'3º Lugar',          matches: BRACKET.third},
      {label:'🏆 Final',          matches: BRACKET.champion},
    ];
    fases.forEach(f => {
      html += `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)">${f.label}</div>`;
      html += `<div style="display:flex;flex-direction:column;gap:6px">`;
      f.matches.forEach(m => {
        html += bracketMatchHtml(m.id, m.label, m.id===104);
      });
      html += `</div>`;
    });
  } else {
    // Desktop: two-column bracket
    const leftR16  = BRACKET.r16.filter(m=>m.side==='L');
    const rightR16 = BRACKET.r16.filter(m=>m.side==='R');
    const leftQF   = BRACKET.qf.filter(m=>m.side==='L');
    const rightQF  = BRACKET.qf.filter(m=>m.side==='R');
    const leftSF   = BRACKET.sf.filter(m=>m.side==='L');
    const rightSF  = BRACKET.sf.filter(m=>m.side==='R');

    const colStyle = 'display:flex;flex-direction:column;gap:10px;flex:1';
    const pairStyle = 'display:flex;flex-direction:column;gap:4px;align-items:center';

    // Helper: render a column of matches
    function col(matches, isFin) {
      return matches.map(m => `<div style="${pairStyle}">${bracketMatchHtml(m.id, m.label, !!isFin)}</div>`).join('');
    }

    html += `<div style="overflow-x:auto">
    <div style="display:flex;gap:8px;align-items:center;min-width:900px;padding:8px 0">
      <!-- Left R16 -->
      <div style="${colStyle}">${col(leftR16)}</div>
      <!-- Left QF -->
      <div style="${colStyle};justify-content:space-around">${col(leftQF)}</div>
      <!-- Left SF -->
      <div style="${colStyle};justify-content:space-around">${col(leftSF)}</div>
      <!-- Center -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;min-width:160px">
        ${col(BRACKET.final)}
        <div style="text-align:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:var(--amarelo);background:var(--verde-escuro);padding:4px 14px;border-radius:8px">🏆 FINAL</div>
        ${bracketMatchHtml(104,'W101 × W102', true)}
        <div style="text-align:center;font-family:'Oswald',sans-serif;font-size:11px;color:var(--muted);margin-top:4px">3º Lugar</div>
        ${bracketMatchHtml(103,'RU101 × RU102', false)}
      </div>
      <!-- Right SF -->
      <div style="${colStyle};justify-content:space-around">${col(rightSF)}</div>
      <!-- Right QF -->
      <div style="${colStyle};justify-content:space-around">${col(rightQF)}</div>
      <!-- Right R16 -->
      <div style="${colStyle}">${col(rightR16)}</div>
    </div></div>`;
  }

  container.innerHTML = html;
}

// Scoring function for mata-mata
// id 104 = final, id 103 = 3rd place
function calcMMScore(palp, gab) {
  // gab: {timeA, timeB, golsA, golsB, penaltisA, penaltisB}
  // palp: same shape
  if (!gab || gab.golsA === null || gab.golsB === null) return null;

  const gabTimes = [gab.timeA, gab.timeB];
  const palpTimes = [palp.timeA, palp.timeB];

  // Determine winner (gab)
  function winner(g) {
    if (g.golsA > g.golsB) return g.timeA;
    if (g.golsB > g.golsA) return g.timeB;
    // draw -> penaltis
    if (g.penaltisA !== null && g.penaltisB !== null)
      return g.penaltisA > g.penaltisB ? g.timeA : g.timeB;
    return null;
  }

  const gabWinner = winner(gab);
  const palpWinner = winner(palp);

  // Check exact score (tempo normal only)
  const exactScore = palp.golsA === gab.golsA && palp.golsB === gab.golsB;
  // Check exact penaltis (only when both have penaltis)
  const exactPen = gab.penaltisA !== null && palp.penaltisA !== null &&
    palp.penaltisA === gab.penaltisA && palp.penaltisB === gab.penaltisB;
  const fullExact = exactScore && (gab.penaltisA === null || exactPen);

  // Slot match: both teams same (order matters)
  const both = palpTimes[0] === gabTimes[0] && palpTimes[1] === gabTimes[1];
  // One team match (in same slot position)
  const oneA = palpTimes[0] === gabTimes[0];
  const oneB = palpTimes[1] === gabTimes[1];
  const one = oneA || oneB;

  const isFinal = palp.id === 104;

  // Special final scoring
  if (isFinal) {
    if (both && fullExact) return 15;
    // campeao/vice checked separately in scoreMMEspecial
    if (one && fullExact) return 5;
    if (both) return 4;
    if (one) return 2;
    if (fullExact) return 1;
    return 0;
  }

  // Regular knockout
  if (both && fullExact) return 7;
  if (one && fullExact) return 5;
  if (both) return 4;
  if (one) return 2;
  if (fullExact) return 1;
  return 0;
}

function scoreMMEspecial(name) {
  const gab104 = STATE.gabarito_mm[104];
  if (!gab104 || gab104.golsA === null) return {campeao:0, vice:0};
  function winner(g) {
    if (g.golsA > g.golsB) return g.timeA;
    if (g.golsB > g.golsA) return g.timeB;
    if (g.penaltisA !== null) return g.penaltisA > g.penaltisB ? g.timeA : g.timeB;
    return null;
  }
  function loser(g) {
    const w = winner(g); if (!w) return null;
    return w === g.timeA ? g.timeB : g.timeA;
  }
  const realCampeao = winner(gab104);
  const realVice = loser(gab104);
  const palp = PALPITES_MM[name].find(j=>j.id===104);
  if (!palp) return {campeao:0,vice:0};
  const palpCampeao = winner(palp);
  const palpVice = loser(palp);
  return {
    campeao: palpCampeao === realCampeao ? 7 : 0,
    vice: palpVice === realVice ? 5 : 0
  };
}

function scoreMM(name) {
  let total = 0, jogos = 0;
  const palpites = PALPITES_MM[name] || [];
  palpites.forEach(palp => {
    const gab = STATE.gabarito_mm[palp.id];
    const pts = calcMMScore(palp, gab);
    if (pts !== null) { total += pts; jogos++; }
  });
  // final especial (campeao/vice) - add if not already 15
  const palp104 = palpites.find(j=>j.id===104);
  const gab104 = STATE.gabarito_mm[104];
  if (palp104 && gab104 && gab104.golsA !== null) {
    const baseScore = calcMMScore(palp104, gab104);
    if (baseScore !== 15) {
      const esp = scoreMMEspecial(name);
      total += esp.campeao + esp.vice;
    }
  }
  return {total, jogos};
}

function normalizeStr(s) {
  if (!s) return '';
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/vini(cius)?\s*jr\.?/i,'vinicius jr').replace(/mbappe/i,'mbappe')
    .replace(/kane/i,'kane').trim();
}

function renderMatamata() {
  const mm = STATE.matamata || {};
  const gab = STATE.gabarito_mm || {};
  const container = document.getElementById('matamata-container');
  const campeaoReal = mm.campeao||'';
  const melhorReal = mm.melhorJogador||'';
  const artilheiroReal = mm.artilheiro||'';
  const cats = [
    {field:'campeao',label:'Campeão',emoji:'🏆',real:campeaoReal},
    {field:'melhorJogador',label:'Melhor Jogador',emoji:'⭐',real:melhorReal},
    {field:'artilheiro',label:'Artilheiro',emoji:'⚽',real:artilheiroReal}
  ];
  let html = '';

  // Resultados especiais (quando disponíveis)
  if (campeaoReal||melhorReal||artilheiroReal) {
    html += `<div class="mm-section-title">Resultados Especiais</div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">`;
    cats.forEach(c => {
      if (c.real) html += `<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:140px;box-shadow:var(--shadow)">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">${c.emoji} ${c.label}</div>
        <div style="font-size:16px;font-weight:700;color:var(--texto)">${c.real}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Palpites especiais (campeao/melhor/artilheiro)
  html += `<div class="mm-section-title">Palpites Especiais · Final</div>`;
  html += `<div class="mm-table-wrap"><table class="palpites">
    <thead><tr>
      <th class="jogo-col">Participante</th>
      <th>🏆 Campeão</th><th>⭐ Melhor Jogador</th><th>⚽ Artilheiro</th><th>Pts</th>
    </tr></thead><tbody>`;
  const mkCell = (val,ok,hasReal) => {
    if (!hasReal) return `<td class="pal-cell sem-resultado">${val}</td>`;
    if (ok) return `<td class="pal-cell exato">${val} ✓</td>`;
    return `<td class="pal-cell errado">${val}</td>`;
  };
  const espRows = PARTICIPANTES.map(n => {
    const p = PALPITES_ESPECIAIS[n];
    const cOk = campeaoReal && normalizeStr(p.campeao)===normalizeStr(campeaoReal);
    const mOk = melhorReal && normalizeStr(p.melhor)===normalizeStr(melhorReal);
    const aOk = artilheiroReal && normalizeStr(p.artilheiro)===normalizeStr(artilheiroReal);
    let pts=0; if(cOk)pts+=20; if(mOk)pts+=20; if(aOk)pts+=20;
    return {n,p,cOk,mOk,aOk,pts};
  }).sort((a,b)=>b.pts-a.pts);
  espRows.forEach(({n,p,cOk,mOk,aOk,pts}) => {
    html += `<tr>
      <td class="jogo-col">${n}</td>
      ${mkCell(p.campeao,cOk,!!campeaoReal)}
      ${mkCell(p.melhor,mOk,!!melhorReal)}
      ${mkCell(p.artilheiro,aOk,!!artilheiroReal)}
      <td class="rank-stat" style="font-weight:700;color:${pts>0?'#166534':'#ccc'}">${pts>0?'+'+pts:'—'}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  container.innerHTML = html;
}

function canalClass(canal) {
  const c = canal.toLowerCase();
  if (c.includes('globo')) return 'pjc-canal-globo';
  if (c.includes('sbt')) return 'pjc-canal-sbt';
  if (c.includes('sportv')) return 'pjc-canal-sportv';
  if (c.includes('cazé') || c.includes('caze')) return 'pjc-canal-caze';
  if (c.includes('n sports') || c.includes('nsports')) return 'pjc-canal-nsports';
  if (c.includes('ge tv') || c.includes('ge')) return 'pjc-canal-ge';
  return 'pjc-canal-other';
}

function toggleAccordion(e, id) {
  e.stopPropagation();
  const body = document.getElementById('acc-' + id);
  const btn = e.currentTarget;
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  if (isOpen) {
    body.style.display = 'none';
    btn.classList.remove('open');
    btn.textContent = '▾';
    return;
  }
  body.style.display = 'block';
  btn.classList.add('open');
  btn.textContent = '▴';
  // Render content
  const j = JOGOS[id];
  const res = getResultado(id);
  const sched = SCHEDULE_MAP[id] || {};
  let html = '';
  if (sched.canais && sched.canais.length > 0) {
    html += `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--border)">
      <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px">📺 Onde ver:</span>
      ${sched.canais.map(c => `<span class="pjc-canal-badge ${canalClass(c)}">${c}</span>`).join('')}
    </div>`;
  }
  html += '<div class="acc-grid">';
  PARTICIPANTES.forEach(n => {
    const palp = PALPITES[n][id];
    const pts = calcPoints(palp, res);
    const hasPalp = palp && palp[0] !== null;
    const scoreStr = hasPalp ? palp[0] + '-' + palp[1] : '—';
    let cls = 'sem-resultado';
    if (hasPalp && res) {
      if (pts === 3) cls = 'exato';
      else if (pts === 1) cls = 'certo';
      else cls = 'errado';
    }
    html += `<div class="acc-item">
      <span class="acc-nome">${n.split(' ')[0]}</span>
      <span class="acc-score ${cls}">${scoreStr}</span>
    </div>`;
  });
  html += '</div>';
  html += `<button class="acc-save-btn" onclick="saveAccordionImage(${id})" id="acc-save-${id}">📷 Salvar imagem</button>`;
  body.innerHTML = html;
}

function toggleAccordionMM(e, id) {
  e.stopPropagation();
  const body = document.getElementById('acc-mm-' + id);
  const btn = e.currentTarget;
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  if (isOpen) {
    body.style.display = 'none';
    btn.classList.remove('open');
    btn.textContent = '▾';
    return;
  }
  body.style.display = 'block';
  btn.classList.add('open');
  btn.textContent = '▴';

  const gab = STATE.gabarito_mm[id];
  const hasRes = gab && gab.golsA !== null;
  const gabHasTeams = gab && gab.timeA && !/^[W12]/.test(gab.timeA) && !gab.timeA.startsWith('RU');

  let html = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;padding:4px 0">`;

  PARTICIPANTES.forEach(n => {
    const palpites = PALPITES_MM[n] || [];
    const palp = palpites.find(p => p.id === id);

    if (!palp) {
      html += `<div class="acc-item" style="min-width:0">
        <span class="acc-nome">${n.split(' ')[0]}</span>
        <span class="acc-score sem-resultado">—</span>
      </div>`;
      return;
    }

    // Avaliar acerto por slot (só quando gabarito tem times reais)
    const acertouA = gabHasTeams && palp.timeA === gab.timeA;
    const acertouB = gabHasTeams && palp.timeB === gab.timeB;

    // Avaliar placar exato (tempo normal)
    const acertouPlacar = hasRes && palp.golsA === gab.golsA && palp.golsB === gab.golsB;
    // Avaliar pênaltis
    const acertouPen = hasRes && gab.penaltisA !== null && palp.penaltisA !== null &&
      palp.penaltisA === gab.penaltisA && palp.penaltisB === gab.penaltisB;
    const placarExato = acertouPlacar && (gab?.penaltisA === null || acertouPen);

    // Cor do quadrinho geral
    const pts = calcMMScore(palp, gab);
    let cardCls = 'sem-resultado';
    if (hasRes || gabHasTeams) {
      if (pts === null) cardCls = 'sem-resultado';
      else if (acertouA && acertouB && placarExato) cardCls = 'exato';
      else if (pts > 0) cardCls = 'certo';
      else cardCls = 'errado';
    }

    // Cor individual dos times
    const corA = gabHasTeams ? (acertouA ? '#166534' : '#888') : '#555';
    const corB = gabHasTeams ? (acertouB ? '#166534' : '#888') : '#555';
    const bgA  = gabHasTeams ? (acertouA ? '#dcfce7' : 'transparent') : 'transparent';
    const bgB  = gabHasTeams ? (acertouB ? '#dcfce7' : 'transparent') : 'transparent';

    // Cor do placar
    const corPlacar = placarExato ? '#166534' : (hasRes ? '#888' : '#555');
    const bgPlacar  = placarExato ? '#dcfce7' : 'transparent';

    // Montar placar string
    let scoreStr = `${palp.golsA}–${palp.golsB}`;
    if (palp.penaltisA !== null) scoreStr += ` (${palp.penaltisA}–${palp.penaltisB}p)`;

    // Pontos
    const ptsStr = pts !== null && hasRes ? (pts > 0 ? `+${pts}` : '0') : '';
    const ptsCor = pts > 0 ? '#166534' : '#ccc';

    html += `<div class="acc-item ${cardCls}" style="min-width:0;gap:3px;padding:7px 8px">
      <span class="acc-nome">${n.split(' ')[0]}</span>
      <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:2px">
        <span style="font-size:10px;font-weight:700;color:${corA};background:${bgA};border-radius:3px;padding:1px 4px;white-space:nowrap">${palp.timeA||'?'}</span>
        <span style="font-size:9px;color:#bbb">×</span>
        <span style="font-size:10px;font-weight:700;color:${corB};background:${bgB};border-radius:3px;padding:1px 4px;white-space:nowrap">${palp.timeB||'?'}</span>
      </div>
      <span style="font-size:12px;font-weight:700;color:${corPlacar};background:${bgPlacar};border-radius:4px;padding:1px 6px;margin-top:2px">${scoreStr}</span>
      ${ptsStr ? `<span style="font-size:9px;font-weight:700;color:${ptsCor}">${ptsStr} pts</span>` : ''}
    </div>`;
  });

  html += '</div>';
  body.innerHTML = html;
}

async function saveAccordionImage(id) {
  const j = JOGOS[id];
  const card = document.getElementById('jogo-card-' + id);
  const body = document.getElementById('acc-' + id);
  if (!card || !body) return;
  const btn = document.getElementById('acc-save-' + id);
  btn.disabled = true; btn.textContent = 'Gerando...';
  // Create a wrapper to capture both
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;background:#eef2e8;padding:12px;border-radius:12px;width:480px;font-family:Inter,sans-serif';
  const cardClone = card.cloneNode(true);
  const bodyClone = body.cloneNode(true);
  // Remove accordion btn from clone
  const accBtnClone = cardClone.querySelector('.accordion-btn');
  if (accBtnClone) accBtnClone.remove();
  cardClone.style.marginBottom = '0';
  cardClone.style.borderRadius = '12px 12px 0 0';
  bodyClone.style.borderRadius = '0 0 12px 12px';
  bodyClone.style.display = 'block';
  const title = document.createElement('div');
  title.style.cssText = 'font-family:Oswald,sans-serif;font-size:11px;font-weight:700;color:#4a7c5e;text-align:right;padding:0 4px 6px;letter-spacing:0.5px;text-transform:uppercase';
  title.textContent = 'Copa Du MunDu · Bolão Copa 2026';
  wrapper.appendChild(title);
  wrapper.appendChild(cardClone);
  wrapper.appendChild(bodyClone);
  document.body.appendChild(wrapper);
  try {
    const canvas = await html2canvas(wrapper, {scale:3, useCORS:true, backgroundColor:'#eef2e8', logging:false});
    const link = document.createElement('a');
    link.download = `palpites_jogo${id+1}_${j.home}_vs_${j.away}.png`.replace(/\s/g,'_');
    link.href = canvas.toDataURL('image/png');
    link.click();
  } finally {
    document.body.removeChild(wrapper);
    btn.disabled = false; btn.textContent = '📷 Salvar imagem';
  }
}

function renderMeusPalpites() {
  const container = document.getElementById('meuspalpites-container');
  if (!mpSelectedName) mpSelectedName = PARTICIPANTES[0];

  let html = `<div class="mp-filter-row">

    <button class="filter-btn ${mpSection==='matamata'?'active':''}" onclick="setMpSection('matamata')">🏆 Mata-Mata</button>
  </div>`;

  const name = mpSelectedName;

  // Stats gerais (sempre visíveis)
  let totalPts = 0, exatos = 0, certos = 0, errados = 0, pendentes = 0;
  for (let i = 0; i < 72; i++) {
    const res = getResultado(i);

    if (!res) { pendentes++; continue; }
    const pts = calcPoints(palp, res);
    if (pts === null) { pendentes++; continue; }
    totalPts += pts;
    if (pts === 3) exatos++;
    else if (pts === 1) certos++;
    else errados++;
  }
  const mmScore = scoreMM(name);
  totalPts += mmScore.total;

  html += `<div class="mp-stats-row">
    <div class="mp-stat-card"><div class="mp-stat-label">Total</div><div class="mp-stat-val">${totalPts}</div></div>
    <div class="mp-stat-card"><div class="mp-stat-label">Exatos 🟢</div><div class="mp-stat-val">${exatos}</div></div>

  </div>`;

  // ── FASE DE GRUPOS ──────────────────────────────────────────────
  if (mpSection === 'grupos') {
    for (let r = 1; r <= 3; r++) {
    const range = RODADA_RANGES[r-1];
    const jogosR = JOGOS.slice(range[0], range[1]+1);
    let rodPts = 0, rodCount = 0;
    jogosR.forEach(j => {
      const res = getResultado(j.id);
      if (!res) return;
      const pts = calcPoints(PALPITES[name][j.id], res);
      if (pts !== null) { rodPts += pts; rodCount++; }
    });
    html += `<div class="mp-rodada-header">Rodada ${r} <span style="font-size:11px;color:var(--muted);font-family:'Inter',sans-serif;font-weight:500">${rodCount} jogos · ${rodPts} pts</span></div>`;
    jogosR.forEach(j => {
      const res = getResultado(j.id);
      const palp = PALPITES[name][j.id];
      const pts = calcPoints(palp, res);
      let cls = 'sem-resultado';
      if (res && palp && palp[0] !== null) {
        if (pts === 3) cls = 'exato';
        else if (pts === 1) cls = 'certo';
        else cls = 'errado';
      }
      const scoreStr = (palp && palp[0] !== null) ? palp[0]+'-'+palp[1] : '—';
      const resStr = res ? res[0]+'-'+res[1] : 'a jogar';
      const ptsStr = pts !== null ? (pts > 0 ? '+'+pts : '0') : '';
      html += `<div class="mp-jogo-row ${cls}">
        <span style="font-size:11px;font-weight:700;color:var(--verde-campo);background:#e8f5ec;padding:2px 6px;border-radius:5px;flex-shrink:0">${(SCHEDULE_MAP[j.id]||{}).hora||'G'+j.group}</span>

        <span class="mp-palp ${cls}">${scoreStr}</span>
        <span class="mp-res">${resStr}</span>
        <span class="mp-pts ${pts===3?'p3':pts===1?'p1':pts===0?'p0':''}">${ptsStr}</span>
      </div>`;
    });
    } // fim for rodadas
  } // fim mpSection === 'grupos'

  // ── MATA-MATA ───────────────────────────────────────────────────
  if (mpSection === 'matamata') {
  const palpitesMM = PALPITES_MM[name] || [];
  if (palpitesMM.length > 0) {
    const FASES_MM = [
      {label:'Oitavas de Final', ids:[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88]},
      {label:'Quartas de Final', ids:[89,90,91,92,93,94,95,96]},
      {label:'Semifinais',       ids:[97,98,99,100]},
      {label:'3º Lugar',         ids:[103]},
      {label:'Final',            ids:[104]}
    ];
    html += `<div class="mp-rodada-header" style="margin-top:20px">Mata-Mata <span style="font-size:11px;color:var(--muted);font-family:'Inter',sans-serif;font-weight:500">${mmScore.jogos} jogos · ${mmScore.total} pts</span></div>`;
    FASES_MM.forEach(fase => {
      const faseJogos = fase.ids.map(id => palpitesMM.find(p=>p.id===id)).filter(Boolean);
      if (faseJogos.length === 0) return;

        const tA = palp.timeA || '—', tB = palp.timeB || '—';
        let scoreStr = `${palp.golsA}–${palp.golsB}`;
        if (palp.penaltisA !== null) scoreStr += ` (${palp.penaltisA}–${palp.penaltisB} pen)`;
        let resStr = '';
        if (gab && gab.golsA !== null) {
          resStr = `${gab.golsA}–${gab.golsB}`;
          if (gab.penaltisA !== null) resStr += ` (${gab.penaltisA}–${gab.penaltisB} pen)`;

          <span class="mp-pts ${pts===null?'':(pts>0?'p3':'p0')}">${pts!==null?(pts>0?'+'+pts:'0'):''}</span>
        </div>`;
      });
    });
  }

  } // fim mpSection === 'matamata'

  container.innerHTML = html;
}

function fmtHoraBR(utcDateStr) {
  try {
    return new Date(utcDateStr).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});
  } catch(e) { return ''; }
}

async function loadCentral() {
  try {
    const r = await fetch(ESPN_SCOREBOARD_URL + '?_=' + Date.now());
    if (!r.ok) throw new Error('status ' + r.status);
    const data = await r.json();
    STATE.central = data.events || [];
    STATE.centralDay = data.day ? data.day.date : null;
  } catch(e) {
    console.warn('Central da Copa: falha ao buscar dados da ESPN', e);
    STATE.central = false; // false = erro (diferente de null = ainda não carregou)
  }
}

function renderCentral() {
  const container = document.getElementById('central-container');
  if (!container) return;

  if (STATE.central === null) {
    container.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted)">
      <div style="font-size:13px">Carregando jogos de hoje...</div>
    </div>`;
    return;
  }
  if (STATE.central === false) {
    container.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:8px">⚠️</div>
      <div style="font-size:13px">Não foi possível carregar os jogos em tempo real agora.<br>Tentando de novo automaticamente...</div>
    </div>`;
    return;
  }
  if (!STATE.central.length) {
    container.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:8px">📅</div>
      <div style="font-size:13px">Nenhum jogo da Copa hoje.</div>
    </div>`;
    return;
  }

  const dayLabel = STATE.centralDay ? fmtDate(STATE.centralDay) : '';
  let html = `<div class="section-header">🔴 Central da Copa</div>
    <div class="cc-refresh-note">${dayLabel} · atualiza a cada 30s</div>`;

  STATE.central.forEach(ev => {
    const comp = (ev.competitions || [])[0];
    if (!comp) return;
    const status = comp.status || {};
    const state = (status.type || {}).state; // pre | in | post
    const home = (comp.competitors || []).find(c => c.homeAway === 'home');
    const away = (comp.competitors || []).find(c => c.homeAway === 'away');
    if (!home || !away) return;
    const homeName = translateTeam(home.team.displayName);
    const awayName = translateTeam(away.team.displayName);
    const faseNote = (comp.altGameNote || '').split(',').pop().trim() || 'Copa 2026';

    let scoreBlock, clockHtml = '', liveBadge = '';
    if (state === 'in') {
      scoreBlock = `<div class="cc-score live">${home.score} × ${away.score}</div>`;
      clockHtml = `<div class="cc-clock">${status.displayClock || status.type.shortDetail || ''}</div>`;
      liveBadge = `<span class="cc-live-badge">● AO VIVO</span>`;
    } else if (state === 'post') {
      scoreBlock = `<div class="cc-score">${home.score} × ${away.score}</div>`;
      clockHtml = `<div class="cc-encerrado">Encerrado</div>`;
    } else {
      scoreBlock = `<div class="cc-time">${fmtHoraBR(comp.date)}</div>`;
    }

    html += `<div class="cc-jogo-card">
      <div class="cc-top-row">
        <span class="cc-fase-badge">${faseNote}</span>
        ${liveBadge}
      </div>
      <div class="cc-teams-row">
        <div class="cc-team">
          <span class="cc-flag">${flag(homeName)}</span>
          <span class="cc-team-name">${homeName}</span>
        </div>
        <div class="cc-score-block">${scoreBlock}${clockHtml}</div>
        <div class="cc-team right">
          <span class="cc-team-name">${awayName}</span>
          <span class="cc-flag">${flag(awayName)}</span>
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function findEspnMatch(homePT, awayPT) {
  if (!STATE.central) return null;
  return STATE.central.find(ev => {
    const comp = ev.competitions && ev.competitions[0];
    if (!comp) return false;
    const home = (comp.competitors || []).find(c => c.homeAway === 'home');
    const away = (comp.competitors || []).find(c => c.homeAway === 'away');
    if (!home || !away) return false;
    const h = translateTeam(home.team.displayName);
    const a = translateTeam(away.team.displayName);
    return (h === homePT && a === awayPT) || (h === awayPT && a === homePT);
  }) || null;
}

// Atualiza só os jogos da fase de grupos que ainda não têm resultado oficial no Sheets,
// sobrepondo o placar/status ao vivo da ESPN sem reconstruir a tela inteira (não fecha accordions abertos).
function applyLiveOverlay() {
  if (jogosPhase !== 'grupos') return; // por agora só fase de grupos
  JOGOS.forEach(j => {
    if (getResultado(j.id)) return; // resultado oficial do Sheets sempre tem prioridade e fica fixo
    const slot = document.getElementById('live-slot-' + j.id);
    if (!slot) return;
    const ev = STATE.central ? findEspnMatch(j.home, j.away) : null;
    if (!ev) { slot.innerHTML = `<span class="visitor-pending">a jogar</span>`; return; }
    const comp = ev.competitions[0];
    const status = comp.status || {};
    const state = (status.type || {}).state;
    const home = comp.competitors.find(c => c.homeAway === 'home');
    const away = comp.competitors.find(c => c.homeAway === 'away');
    const nossoHomeEhEspnHome = translateTeam(home.team.displayName) === j.home;
    const scoreCasa = nossoHomeEhEspnHome ? home.score : away.score;
    const scoreFora = nossoHomeEhEspnHome ? away.score : home.score;
    if (state === 'in') {
      slot.innerHTML = `<div class="visitor-result-display live">${scoreCasa} × ${scoreFora}</div>`;
    } else if (state === 'post') {
      slot.innerHTML = `<div class="visitor-result-display">${scoreCasa} × ${scoreFora}</div>`;
    } else {
      slot.innerHTML = `<span class="visitor-pending">a jogar</span>`;
    }
  });
}

async function refreshLiveData() {
  await loadCentral();
  renderCentral();
  applyLiveOverlay();
}

function startCentralPolling() {
  refreshLiveData();
  if (centralInterval) clearInterval(centralInterval);
  centralInterval = setInterval(refreshLiveData, 15000);
}

function stopCentralPolling() {
  if (centralInterval) { clearInterval(centralInterval); centralInterval = null; }
}

// Recarrega resultados.json + planilhas do Google Sheets e re-renderiza a aba ativa
async function refreshFromSheets() {
  await loadState();
  const activePage = document.querySelector('.page.active');
  const id = activePage ? activePage.id.replace('page-', '') : 'jogos';
  if (id === 'jogos') renderJogos();
  if (id === 'ranking') renderRanking();
  if (id === 'palpites') renderPalpites();
  if (id === 'matamata') renderMatamata();
  if (id === 'meuspalpites') renderMeusPalpites();
  if (id === 'central') {
    if (centralSection === 'hoje') renderCentral();
    if (centralSection === 'grupos') renderGrupos();
    if (centralSection === 'matamata') renderBracket();
  }
}

// ============================================================
// INIT
// ============================================================
(async()=>{
  await loadState();
  renderJogos();
  startCentralPolling(); // 'Jogos' é a aba inicial, então já liga o placar ao vivo
  // Auto-refresh do Sheets (resultados oficiais) a cada 2 minutos
  setInterval(refreshFromSheets, 2 * 60 * 1000);
})();
</script>
